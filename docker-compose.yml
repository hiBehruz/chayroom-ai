services:
  postgres:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: chayroom
      POSTGRES_USER: chayroom
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chayroom -d chayroom"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-off DB migrations: docker compose --profile migrate run --rm migrate
  migrate:
    build:
      context: .
      target: source
    env_file: .env
    environment:
      - DATABASE_URL=postgres://chayroom:${POSTGRES_PASSWORD}@postgres:5432/chayroom
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["migrate"]
    command: pnpm db:migrate

  nuxt:
    build:
      context: .
      target: runtime
    restart: always
    env_file: .env
    environment:
      - DATABASE_URL=postgres://chayroom:${POSTGRES_PASSWORD}@postgres:5432/chayroom
      - REDIS_URL=redis://redis:6379
      - NUXT_ADMIN_TELEGRAM_IDS=${NUXT_ADMIN_TELEGRAM_IDS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - nuxt

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
